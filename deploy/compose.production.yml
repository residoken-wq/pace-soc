services:
  dashboard:
    image: ${DASHBOARD_IMAGE:?DASHBOARD_IMAGE must be set}
    container_name: pace-soc-dashboard
    restart: unless-stopped
    env_file:
      - /opt/pace-soc/.env.production
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      ALLOWED_ORIGIN: https://soc.pace.edu.vn
      NODE_EXTRA_CA_CERTS: /run/secrets/wazuh-ca-bundle.pem
    volumes:
      - dashboard-data:/app/data
      - /opt/pace-soc/wazuh-ca-bundle.pem:/run/secrets/wazuh-ca-bundle.pem:ro
    networks:
      - frontend
      - soc-backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s
    security_opt:
      - no-new-privileges:true

  caddy:
    image: caddy:2.10-alpine
    container_name: pace-soc-caddy
    restart: unless-stopped
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL must be set}
    depends_on:
      dashboard:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - frontend
    security_opt:
      - no-new-privileges:true

volumes:
  dashboard-data:
  caddy-data:
  caddy-config:

networks:
  frontend:
  soc-backend:
    internal: true
